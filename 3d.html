<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>3D 立體訓練場|無人機足球</title>
<style>
:root{
  --hud:#4fe3a3; --accent:#ff8a3c; --red:#ff5a6e; --line:#22304a;
  --txt:#e8eef7; --dim:#8fa3bf; --gold:#ffd166;
  --mono:Consolas,"Cascadia Mono",monospace;
  --cjk:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b1220;
  font-family:var(--cjk);color:var(--txt);touch-action:none;overscroll-behavior:none}
#c{position:fixed;inset:0;display:block}
.topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;
  padding:10px 12px;flex-wrap:wrap;z-index:5}
.pill{background:rgba(13,21,38,.85);border:1px solid var(--line);border-radius:999px;
  padding:7px 13px;font-size:13px;color:var(--txt);text-decoration:none;line-height:1;
  font-family:var(--cjk);cursor:pointer}
a.pill:hover,button.pill:hover{border-color:var(--hud)}
.title{font-weight:800;font-size:14px;letter-spacing:1px;cursor:default}
.stats{position:fixed;top:54px;left:12px;display:flex;flex-direction:column;gap:6px;z-index:5;pointer-events:none}
.stat{background:rgba(13,21,38,.85);border:1px solid var(--line);border-radius:10px;
  padding:6px 12px;font-family:var(--mono);font-size:13px;min-width:126px}
.stat b{color:var(--hud);font-weight:400}
.stat.warn b{color:var(--red)}
.toast{position:fixed;top:20%;left:50%;transform:translateX(-50%);z-index:6;
  background:rgba(13,21,38,.92);border:1px solid var(--hud);color:var(--hud);
  border-radius:12px;padding:10px 22px;font-size:19px;font-weight:800;opacity:0;
  transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:92vw}
.toast.show{opacity:1}
.objline{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:5;
  background:rgba(13,21,38,.85);border:1px solid rgba(255,138,60,.5);color:var(--accent);
  border-radius:10px;padding:6px 16px;font-size:13px;max-width:82vw;text-align:center;pointer-events:none}
.prog{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;
  color:#dffff0;font-size:14px;font-weight:700;text-align:center;pointer-events:none;
  background:rgba(11,18,32,.78);border:1px solid rgba(79,227,163,.35);
  padding:7px 18px;border-radius:999px;white-space:nowrap;max-width:94vw}
.stick{position:fixed;bottom:26px;width:132px;height:132px;border-radius:50%;z-index:7;
  background:rgba(13,21,38,.5);border:2px solid rgba(79,227,163,.35);display:none}
.stick .nub{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;
  background:rgba(79,227,163,.3);border:2px solid var(--hud);transform:translate(-50%,-50%)}
.stick .tag{position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--dim);white-space:nowrap}
#stickL{left:22px}
#stickR{right:22px}
body.touchmode .stick{display:block}
#disarmBtn{position:fixed;right:26px;bottom:190px;z-index:8;display:none;
  background:var(--red);color:#fff;border:0;border-radius:50%;width:88px;height:88px;
  font-size:16px;font-weight:800;font-family:var(--cjk);cursor:pointer;
  box-shadow:0 0 0 8px rgba(255,90,110,.2)}
#disarmBtn.show{display:block}
.ovl{position:fixed;inset:0;z-index:10;background:rgba(7,11,20,.85);
  display:flex;align-items:center;justify-content:center;padding:16px}
.panel{background:#111927;border:1px solid var(--line);border-radius:16px;
  padding:22px 24px;max-width:560px;width:100%;max-height:90vh;overflow:auto}
.panel h1{margin:0 0 6px;font-size:21px}
.panel h1 .em{color:var(--accent)}
.panel p{color:var(--dim);font-size:13px;line-height:1.8;margin:8px 0}
.panel .keys{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:10px 0;font-size:12px}
@media(max-width:520px){.panel .keys{grid-template-columns:1fr 1fr}}
.panel .keys div{background:#0d1520;border:1px solid var(--line);border-radius:10px;padding:8px 10px;line-height:1.7}
.panel .keys b{color:var(--hud);font-family:var(--mono);font-weight:400}
.lvgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.lvbtn{display:flex;flex-direction:column;gap:2px;text-align:left;
  background:#0d1520;border:1px solid var(--line);border-radius:12px;
  padding:10px 13px;color:var(--txt);cursor:pointer;font-family:var(--cjk)}
.lvbtn:hover{border-color:var(--hud)}
.lvbtn .nm{font-size:13.5px;font-weight:700}
.lvbtn .nm .no{color:var(--accent);font-family:var(--mono);margin-right:6px}
.lvbtn .bs{font-size:11px;color:var(--dim);font-family:var(--mono)}
.lvbtn .bs .ok{color:var(--hud)}
.lvbtn.free{grid-column:1/-1;border-color:rgba(79,227,163,.4)}
.go{display:inline-block;background:var(--hud);color:#06251a;border:0;
  border-radius:12px;padding:12px 20px;font-size:15px;font-weight:800;cursor:pointer;
  font-family:var(--cjk);margin:4px 6px 0 0}
.go.alt{background:#1b2740;color:var(--txt);border:1px solid var(--line)}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="topbar">
  <a class="pill" href="index.html">← 首頁</a>
  <span class="pill title">🧊 3D 立體訓練場</span>
  <button class="pill" id="menuBtn">📋 關卡</button>
  <button class="pill" id="camBtn">📷 跟隨</button>
  <button class="pill" id="resetBtn">↺ 重試</button>
</div>
<div class="stats">
  <div class="stat">高度 <b id="alt">0.0</b> m</div>
  <div class="stat">速度 <b id="spd">0.0</b> m/s</div>
  <div class="stat">時間 <b id="tim">0.0</b> s</div>
  <div class="stat warn">失誤 <b id="flt">0</b></div>
</div>
<div class="objline" id="obj"></div>
<div class="toast" id="toast"></div>
<div class="prog" id="prog">左桿:升降+旋轉|右桿:前後+平移</div>
<button id="disarmBtn">斷電</button>

<div class="stick" id="stickL"><span class="tag">升降・旋轉</span><div class="nub"></div></div>
<div class="stick" id="stickR"><span class="tag">前後・平移</span><div class="nub"></div></div>

<div class="ovl" id="menu">
  <div class="panel">
    <h1>🧊 3D 立體訓練場 <span class="em">十大術科</span></h1>
    <div class="keys">
      <div>⌨️ 鍵盤<br><b>W/S</b> 升降 <b>A/D</b> 旋轉<br><b>↑↓←→</b> 前後/平移<br><b>空白鍵</b> 斷電</div>
      <div>📱 觸控<br>左右虛擬搖桿<br>紅色圓鈕=斷電</div>
      <div>🎮 PS5 手把<br>雙搖桿同實機<br><b>✕</b> 斷電 <b>OPTIONS</b> 重試</div>
    </div>
    <div class="lvgrid" id="lvgrid"></div>
  </div>
</div>

<div class="ovl hidden" id="done">
  <div class="panel" style="text-align:center">
    <h1 id="doneTitle">🏁 過關!</h1>
    <p style="font-size:26px;color:var(--hud);font-family:var(--mono);margin:14px 0" id="doneTime">--</p>
    <p id="doneSub"></p>
    <div>
      <button class="go" id="nextBtn">下一關 →</button>
      <button class="go alt" id="againBtn">再試一次</button>
      <button class="go alt" id="backBtn">回選單</button>
    </div>
  </div>
</div>

<script src="three.min.js"></script>
<script>
/* ================= scene ================= */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0b1220);
scene.fog=new THREE.Fog(0x0b1220,18,46);
const camera=new THREE.PerspectiveCamera(62,1,.1,120);
scene.add(new THREE.HemisphereLight(0x9fc4ff,0x0c1a12,.95));
const sun=new THREE.DirectionalLight(0xffffff,.55);sun.position.set(6,12,4);scene.add(sun);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60),
  new THREE.MeshLambertMaterial({color:0x0d1520}));
floor.rotation.x=-Math.PI/2;scene.add(floor);
const grid=new THREE.GridHelper(44,44,0x1e5c46,0x16263d);
grid.position.y=.01;scene.add(grid);
const postMat=new THREE.MeshLambertMaterial({color:0x22304a});
for(let z=-2;z<=20;z+=4){for(const x of[-6,6]){
  const p=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,2.4,8),postMat);
  p.position.set(x,1.2,z);scene.add(p);
}}
/* goal (far end) */
const goalMat=new THREE.MeshLambertMaterial({color:0xd7e1f0});
function fixedBar(w,h,d,x,y,z){const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),goalMat);
  b.position.set(x,y,z);scene.add(b);return b}
fixedBar(.1,1.9,.1,-2,.95,18.4);fixedBar(.1,1.9,.1,2,.95,18.4);fixedBar(4.1,.1,.1,0,1.9,18.4);
const net=new THREE.Mesh(new THREE.PlaneGeometry(4,1.9),
  new THREE.MeshBasicMaterial({color:0x4fe3a3,transparent:true,opacity:.12,side:THREE.DoubleSide}));
net.position.set(0,.95,18.9);scene.add(net);

/* ================= drone ================= */
const drone=new THREE.Group();
drone.add(new THREE.Mesh(new THREE.SphereGeometry(.5,14,9),
  new THREE.MeshBasicMaterial({color:0x5aa7ff,wireframe:true,transparent:true,opacity:.55})));
drone.add(new THREE.Mesh(new THREE.BoxGeometry(.36,.1,.36),
  new THREE.MeshLambertMaterial({color:0x2c3d5e})));
const nose=new THREE.Mesh(new THREE.ConeGeometry(.1,.24,10),
  new THREE.MeshLambertMaterial({color:0xff8a3c}));
nose.rotation.x=Math.PI/2;nose.position.set(0,.02,.36);drone.add(nose);
const props=[];
for(const[x,z]of[[-.2,-.2],[.2,-.2],[-.2,.2],[.2,.2]]){
  const pr=new THREE.Mesh(new THREE.BoxGeometry(.3,.015,.05),
    new THREE.MeshBasicMaterial({color:0xbfd4ee,transparent:true,opacity:.8}));
  pr.position.set(x,.1,z);drone.add(pr);props.push(pr);
}
scene.add(drone);

/* ================= level object helpers ================= */
const levelGroup=new THREE.Group();scene.add(levelGroup);
function torus(x,y,z,r,color,rotY=0,flat=false){
  const m=new THREE.Mesh(new THREE.TorusGeometry(r,.06,10,26),
    new THREE.MeshBasicMaterial({color}));
  m.position.set(x,y,z);if(flat)m.rotation.x=Math.PI/2;m.rotation.y=rotY;
  levelGroup.add(m);return m;}
function zoneCyl(x,z,r,y0,y1,color=0x4fe3a3,op=.14){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,y1-y0,28,1,true),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,side:THREE.DoubleSide}));
  m.position.set(x,(y0+y1)/2,z);levelGroup.add(m);return m;}
function floorPad(x,z,r,color,op=.85){
  const m=new THREE.Mesh(new THREE.CircleGeometry(r,28),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:op}));
  m.rotation.x=-Math.PI/2;m.position.set(x,.02,z);levelGroup.add(m);return m;}
function slab(x,y,z,w,h,d,color,op=.1){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:op}));
  m.position.set(x,y,z);levelGroup.add(m);return m;}
function pole(x,z,h=2.6,color=0xff8a3c){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,h,10),
    new THREE.MeshLambertMaterial({color}));
  m.position.set(x,h/2,z);levelGroup.add(m);return m;}

/* ================= state ================= */
const pos=new THREE.Vector3(0,.15,0), vel=new THREE.Vector3();
let yaw=0,camMode=0,flying=false,faults=0,t0=0,curLv=0,LV=null,doneFlag=false;
const $=id=>document.getElementById(id);
const alt=()=>pos.y-.15;
function toast(msg,ms=1500){const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),ms);}
let AC;function beep(f=880,d=.09,v=.14){try{
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.frequency.value=f;
  o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);}catch(e){}}
function addFault(msg){faults++;$('flt').textContent=faults;toast('⚠ '+msg);beep(200,.14);}
function prog(s){$('prog').textContent=s;}
function angDiff(a,b){let d=a-b;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;return d;}
function segDist(px,pz,ax,az,bx,bz){const dx=bx-ax,dz=bz-az;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(pz-az)*dz)/(dx*dx+dz*dz)));
  return Math.hypot(px-(ax+t*dx),pz-(az+t*dz));}
const best=JSON.parse(localStorage.getItem('drone3dBest')||'{}');
function saveBest(id,t,f){
  if(!best[id]||t<best[id].t){best[id]={t:+t.toFixed(1),f};
    localStorage.setItem('drone3dBest',JSON.stringify(best));}
}

/* ================= input ================= */
const keys={};let disarmReq=false;
addEventListener('keydown',e=>{keys[e.code]=1;
  if(e.code==='Space'){disarmReq=true;e.preventDefault();}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=0});
function makeStick(el){
  const st={x:0,y:0,id:null},nub=el.querySelector('.nub');
  function mv(e){const r=el.getBoundingClientRect();
    let dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
    const m=r.width/2-20,l=Math.hypot(dx,dy);
    if(l>m){dx*=m/l;dy*=m/l}
    st.x=dx/m;st.y=dy/m;
    nub.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}
  el.addEventListener('pointerdown',e=>{st.id=e.pointerId;el.setPointerCapture(e.pointerId);mv(e)});
  el.addEventListener('pointermove',e=>{if(e.pointerId===st.id)mv(e)});
  const end=e=>{if(e.pointerId===st.id){st.id=null;st.x=0;st.y=0;nub.style.transform='translate(-50%,-50%)'}};
  el.addEventListener('pointerup',end);el.addEventListener('pointercancel',end);
  return st;
}
const tL=makeStick($('stickL')),tR=makeStick($('stickR'));
if('ontouchstart' in window)document.body.classList.add('touchmode');
$('disarmBtn').addEventListener('pointerdown',()=>{disarmReq=true;});
const dz=v=>Math.abs(v)<.13?0:v;
function readInput(){
  let thr=(keys.KeyW?1:0)-(keys.KeyS?1:0);
  let yawIn=(keys.KeyD?1:0)-(keys.KeyA?1:0);
  let pit=(keys.ArrowUp?1:0)-(keys.ArrowDown?1:0);
  let rol=(keys.ArrowRight?1:0)-(keys.ArrowLeft?1:0);
  thr+=-tL.y;yawIn+=tL.x;pit+=-tR.y;rol+=tR.x;
  const gps=navigator.getGamepads?navigator.getGamepads():[];
  for(const gp of gps){if(!gp)continue;
    thr+=-dz(gp.axes[1]||0);yawIn+=dz(gp.axes[0]||0);
    pit+=-dz(gp.axes[3]||0);rol+=dz(gp.axes[2]||0);
    if(gp.buttons[0]&&gp.buttons[0].pressed&&!gp._b0){gp._b0=1;disarmReq=true;}
    if(gp.buttons[0]&&!gp.buttons[0].pressed)gp._b0=0;
    if(gp.buttons[9]&&gp.buttons[9].pressed&&!gp._b9){gp._b9=1;restartLevel();}
    if(gp.buttons[9]&&!gp.buttons[9].pressed)gp._b9=0;
  }
  const c=v=>Math.max(-1,Math.min(1,v));
  return{thr:c(thr),yaw:c(yawIn),pit:c(pit),rol:c(rol)};
}

/* ================= physics ================= */
const MAXH=3.4,MAXV=2.6,YAWRATE=2.6;
const fwd=new THREE.Vector3(),right=new THREE.Vector3(),tmp=new THREE.Vector3();
let lastVy=0,prevAlt=0;
function physStep(dt,inp){
  yaw-=inp.yaw*YAWRATE*dt;
  fwd.set(Math.sin(yaw),0,Math.cos(yaw));
  right.set(-Math.cos(yaw),0,Math.sin(yaw)); /* 螢幕右=-X */
  tmp.copy(fwd).multiplyScalar(inp.pit*MAXH).addScaledVector(right,inp.rol*MAXH);
  vel.x+=(tmp.x-vel.x)*Math.min(1,4*dt);
  vel.z+=(tmp.z-vel.z)*Math.min(1,4*dt);
  vel.y+=((inp.thr*MAXV)-vel.y)*Math.min(1,4.5*dt);
  lastVy=vel.y;
  pos.addScaledVector(vel,dt);
  pos.x=Math.max(-5.7,Math.min(5.7,pos.x));
  pos.z=Math.max(-1.5,Math.min(19.2,pos.z));
  pos.y=Math.max(.15,Math.min(6,pos.y));
  if(pos.y<=.151)vel.y=Math.max(0,vel.y);
  if(!flying&&alt()>.3){flying=true;if(!t0)t0=performance.now();}
  drone.position.copy(pos);
  drone.rotation.set(0,yaw,0);
  drone.rotateX(inp.pit*.28);drone.rotateZ(inp.rol*.28);
  props.forEach((p,i)=>p.rotation.y+=(i%2?1:-1)*(.6+Math.abs(inp.thr)*.5));
}
function elapsed(){return t0?(performance.now()-t0)/1000:0;}

/* ================= levels ================= */
const LVDEF=[];
const COLTODO=0x44608c,COLNEXT=0xff8a3c,COLDONE=0x4fe3a3;

/* ---- free flight: ring course + ball ---- */
LVDEF[0]={name:'自由飛行(穿環+射門)',obj:'依序穿過 10 個光環計時,再把白球撞進球門',
 start:[0,0],
 setup(){
  const P=[[0,1.2,4],[2.5,1.6,7],[4.5,2.2,10],[3,2.7,13],[0,2.3,15.5],
    [-3,1.9,13.5],[-4.6,1.5,10],[-3,1.2,7],[-1.2,1.7,5],[0,2.1,9.5]];
  const rings=P.map(([x,y,z],i)=>torus(x,y,z,.85,COLTODO,i%3===1?.6:i%3===2?-.6:0));
  const ball=new THREE.Mesh(new THREE.SphereGeometry(.35,18,14),
    new THREE.MeshLambertMaterial({color:0xffffff}));
  ball.position.set(0,.35,15);levelGroup.add(ball);
  const bv=new THREE.Vector3();let ri=0,goals=0;
  const paint=()=>rings.forEach((r,i)=>r.material.color.setHex(i<ri?COLDONE:i===ri?COLNEXT:COLTODO));
  paint();
  return{update(dt){
    if(ri<10){
      if(pos.distanceTo(rings[ri].position)<.9){ri++;beep(660+ri*60);paint();
        if(ri===10){success(`穿環完賽!`);return;}else toast(`第 ${ri} 環!`,600);}
      rings[Math.min(ri,9)].scale.setScalar(1+Math.sin(performance.now()/180)*.06);
      prog(`下一環:${ri+1}/10|進球:${goals}`);
    }else prog(`自由飛行|進球:${goals}`);
    bv.y-=9.8*dt;ball.position.addScaledVector(bv,dt);
    if(ball.position.y<.35){ball.position.y=.35;bv.y=Math.abs(bv.y)*.35;bv.x*=.985;bv.z*=.985;}
    if(Math.abs(ball.position.x)>5.4){bv.x*=-.7;ball.position.x=Math.sign(ball.position.x)*5.4;}
    if(ball.position.z<-1){bv.z*=-.7;ball.position.z=-1;}
    tmp.copy(ball.position).sub(pos);const d=tmp.length();
    if(d<.88){tmp.normalize();const push=Math.max(1.6,vel.length()*1.35);
      bv.x=tmp.x*push;bv.z=tmp.z*push;bv.y=Math.max(bv.y,tmp.y*push*.5+1);beep(320,.05,.08);}
    if(ball.position.z>18.1&&Math.abs(ball.position.x)<2&&ball.position.y<1.9){
      goals++;toast('⚽ 進球!!',1500);beep(980,.25);
      ball.position.set(0,.35,15);bv.set(0,0,0);}
    else if(ball.position.z>19.3){bv.z*=-.7;ball.position.z=19.3;}
  }};
}};

/* ---- 1 起飛與定點懸停 ---- */
LVDEF[1]={name:'起飛與定點懸停',obj:'停進光柱(半徑50cm.高度1.0–1.6m)連續懸停10秒;飄出計時歸零',
 start:[0,6],
 setup(){
  floorPad(0,6,.55,0x1c4433);zoneCyl(0,6,.5,1.15,1.75);
  let hold=0;
  return{update(dt){
    if(!flying){prog('緩推油門,升進綠色光柱');return;}
    const ok=Math.hypot(pos.x,pos.z-6)<.5&&alt()>1.0&&alt()<1.6;
    if(ok){hold+=dt;prog(`懸停 ${hold.toFixed(1)} / 10.0 秒`);
      if(hold>=10)success('圈內懸停 10 秒達成!');}
    else{if(hold>1)toast('飄出!計時歸零');hold=0;prog('回到光柱內(半徑50cm.1.0–1.6m)');}
  }};
}};

/* ---- 2 四方位旋轉 ---- */
LVDEF[2]={name:'四方位旋轉',obj:'光柱內懸停,機頭依序轉向:右→後→左→前,每方位穩3秒',
 start:[0,6],
 setup(){
  floorPad(0,6,.85,0x1c4433);zoneCyl(0,6,.8,.95,2.15);
  const seq=[{d:-Math.PI/2,n:'右(90°)'},{d:Math.PI,n:'後(180°)'},{d:Math.PI/2,n:'左(270°)'},{d:0,n:'前(0°)'}];
  let ti=0,hold=0;
  return{update(dt){
    if(!flying){prog('起飛,在光柱內懸停');return;}
    const inZone=Math.hypot(pos.x,pos.z-6)<.8&&alt()>.8&&alt()<2.0;
    if(!inZone){hold=0;prog('先回到光柱內!');return;}
    const tgt=seq[ti];
    if(Math.abs(angDiff(yaw,tgt.d))<.3){hold+=dt;
      prog(`${tgt.n} 穩定 ${hold.toFixed(1)} / 3.0 秒`);
      if(hold>=3){ti++;hold=0;beep(700+ti*90);
        if(ti===4)success('四方位旋轉完成!');else toast(`下一個:${seq[ti].n}`,900);}}
    else{hold=0;prog(`右轉,把機頭對準:${tgt.n}`);}
  }};
}};

/* ---- 3 前後飛行 ---- */
LVDEF[3]={name:'前後飛行控制',obj:'沿走廊:前進北環停2秒 → 倒退回南環停2秒(偏出±35cm記失誤)',
 start:[0,4],
 setup(){
  slab(.42,.05,8,.06,.1,10,0xff8a3c,.55);slab(-.42,.05,8,.06,.1,10,0xff8a3c,.55);
  const rN=torus(0,1.2,12,.8,COLNEXT),rS=torus(0,1.2,4,.8,COLTODO);
  let ph=0,hold=0,out=false;
  return{update(dt){
    if(!flying){prog('起飛後沿走廊前進到北環(橘)');return;}
    if(Math.abs(pos.x)>.35&&!out){out=true;addFault('偏出走廊 ±35cm');}
    if(Math.abs(pos.x)<.28)out=false;
    const tgt=ph===0?rN:rS;
    if(pos.distanceTo(tgt.position)<.7){hold+=dt;
      prog(`${ph===0?'北環':'南環'}懸停 ${hold.toFixed(1)} / 2.0 秒`);
      if(hold>=2){if(ph===0){ph=1;hold=0;beep(760);
          rN.material.color.setHex(COLDONE);rS.material.color.setHex(COLNEXT);
          toast('倒退!退回南環(不轉頭)');}
        else success('前後飛行完成!');}}
    else{hold=0;prog(ph===0?'前進 → 北環(機頭朝前)':'倒退 → 南環(不轉頭!)');}
  }};
}};

/* ---- 4 左右側飛 ---- */
LVDEF[4]={name:'左右側飛控制',obj:'右移進右環停2秒 → 左移進左環停2秒(平移滑動)',
 start:[0,8],
 setup(){
  /* 螢幕右 = -X */
  const rR=torus(-2.5,1.2,8,.8,COLNEXT,Math.PI/2),rL=torus(2.5,1.2,8,.8,COLTODO,Math.PI/2);
  slab(0,.05,8,5.6,.1,.06,0x44608c,.5);
  let ph=0,hold=0;
  return{update(dt){
    if(!flying){prog('起飛,向右平移到右環(橘)');return;}
    const tgt=ph===0?rR:rL;
    if(pos.distanceTo(tgt.position)<.7){hold+=dt;
      prog(`${ph===0?'右環':'左環'}懸停 ${hold.toFixed(1)} / 2.0 秒`);
      if(hold>=2){if(ph===0){ph=1;hold=0;beep(760);
          rR.material.color.setHex(COLDONE);rL.material.color.setHex(COLNEXT);
          toast('向左平移!滑到左環');}
        else success('左右側飛完成!');}}
    else{hold=0;prog(ph===0?'向右平移 → 右環':'向左平移 → 左環(機頭別轉)');}
  }};
}};

/* ---- 5 定高巡航 ---- */
LVDEF[5]={name:'定高巡航',obj:'高度鎖1.2m±20cm:北環→南環來回(出綠帶>1秒記失誤)',
 start:[0,4],
 setup(){
  slab(0,1.35,9,2.2,.4,11,0x4fe3a3,.08);
  const rN=torus(0,1.35,14,.8,COLNEXT),rS=torus(0,1.35,4,.8,COLTODO);
  let ph=0,outT=0,ticked=false;
  return{update(dt){
    if(!flying){prog('起飛,升到 1.2m 綠色高度帶');return;}
    if(alt()<1.0||alt()>1.4){outT+=dt;
      if(outT>1&&!ticked){ticked=true;addFault('高度跑出綠帶超過 1 秒');}}
    else{outT=0;ticked=false;}
    const tgt=ph===0?rN:rS;
    if(pos.distanceTo(tgt.position)<.85){
      if(ph===0){ph=1;beep(760);rN.material.color.setHex(COLDONE);
        rS.material.color.setHex(COLNEXT);toast('折返!回南環');}
      else success('定高巡航完成!');}
    prog(`高度 ${alt().toFixed(2)}m(目標1.2±0.2)|${ph===0?'去程→北環':'回程→南環'}`);
  }};
}};

/* ---- 6 正方形航路 ---- */
LVDEF[6]={name:'2×2m 正方形航路',obj:'西南→西北→東北→東南→回西南;每角原地轉90°對準下段(共4次旋轉)',
 start:[1,6],
 setup(){
  /* 螢幕左=+X=西.前=+Z=北 */
  const C=[[1,6,'西南'],[1,8,'西北'],[-1,8,'東北'],[-1,6,'東南']];
  const marks=C.map(([x,z])=>{pole(x,z,1.1,0x7a5cff);
    return torus(x,1.35,z,.5,COLTODO,0,true);});
  const route=[1,2,3,0];/* NW NE SE SW */
  const segHead=[-Math.PI/2,Math.PI,Math.PI/2,0];/* 到角後要對準的下一段方向 */
  let k=0,mode='fly',hold=0,out=false;
  marks[1].material.color.setHex(COLNEXT);
  const names=['西南','西北','東北','東南'];
  return{update(dt){
    if(!flying){prog('起飛(高度約1.2m),機頭朝前,先飛向西北角');return;}
    const tgtI=route[k],[tx,tz]=C[tgtI];
    const prevI=k===0?0:route[k-1],[px,pz]=C[prevI];
    if(mode==='fly'){
      if(segDist(pos.x,pos.z,px,pz,tx,tz)>.65&&!out){out=true;addFault('偏離邊線');}
      if(segDist(pos.x,pos.z,px,pz,tx,tz)<.5)out=false;
      prog(`前往:${names[tgtI]}角(${k+1}/4)`);
      if(Math.hypot(pos.x-tx,pos.z-tz)<.5&&alt()>.6&&alt()<2.2){
        mode='rot';hold=0;beep(700);
        toast(k<3?'原地右轉 90° 對準下一段':'回到西南!轉回正前方',1300);}
    }else{
      if(Math.abs(angDiff(yaw,segHead[k]))<.28&&Math.hypot(pos.x-tx,pos.z-tz)<.6){
        hold+=dt;prog(`旋轉對準⋯ ${hold.toFixed(1)} / 0.6 秒`);
        if(hold>=.6){marks[tgtI].material.color.setHex(COLDONE);
          k++;beep(860);
          if(k===4)success('正方形航路完成!4 次旋轉全數達成');
          else{mode='fly';marks[route[k]].material.color.setHex(COLNEXT);}}}
      else{hold=0;prog(`在${names[tgtI]}角上方,原地右轉 90°(第 ${k+1} 次旋轉)`);}
    }
  }};
}};

/* ---- 7 模擬進球急停 ---- */
LVDEF[7]={name:'模擬進球急停',obj:'全速(≥2.0m/s)衝過紅色球門線,在70cm煞車區內完全停住',
 start:[0,2],
 setup(){
  slab(0,1,14,7,2,.06,0xff5a6e,.35);
  slab(0,.9,14.35,7,1.8,.7,0xff8a3c,.10);
  let ph=0,prevZ=0;
  return{update(dt){
    if(!flying){prog('從這裡全速衝刺!目標:紅色球門線');prevZ=pos.z;return;}
    if(ph===0){
      prog(`速度 ${vel.length().toFixed(1)} m/s(需 ≥2.0 過線)`);
      if(prevZ<14&&pos.z>=14){
        const sp=vel.length();
        if(sp>=2){ph=1;beep(760);toast('過線!反向撥桿煞車!!',900);}
        else{toast('太慢!回起點重跑(需 ≥2.0 m/s)');pos.set(0,pos.y,2);vel.set(0,0,0);}
      }
    }else{
      prog(`煞車!剩餘空間 ${(14.7-pos.z).toFixed(2)} m`);
      if(pos.z>14.7){addFault('衝出煞車區,重跑');ph=0;pos.set(0,pos.y,2);vel.set(0,0,0);}
      else if(vel.length()<.3)success('進球急停成功!');
    }
    prevZ=pos.z;
  }};
}};

/* ---- 8 8字協調飛行 ---- */
LVDEF[8]={name:'「8」字協調飛行',obj:'繞雙桿依序穿過 8 個檢查點,航跡圓滑',
 start:[0,5],
 setup(){
  pole(1.8,9);pole(-1.8,9);
  const cps=[[0,9],[1.8,7.5],[3.3,9],[1.8,10.5],[0,9],[-1.8,10.5],[-3.3,9],[-1.8,7.5]];
  const dots=cps.map(([x,z],i)=>torus(x,1.2,z,.45,i===0?COLNEXT:COLTODO,0,true));
  let ci=0;
  return{update(dt){
    if(!flying){prog('起飛(約1.2m),從中央檢查點開始畫 8 字');return;}
    if(ci<8){
      const[x,z]=cps[ci];
      if(Math.hypot(pos.x-x,pos.z-z)<.7&&alt()>.6&&alt()<2.4){
        dots[ci].material.color.setHex(COLDONE);ci++;beep(620+ci*55);
        if(ci===8)success('8 字飛行完成!');
        else{dots[ci].material.color.setHex(COLNEXT);toast(`檢查點 ${ci}/8`,500);}}
      prog(`下一個檢查點:${ci+1}/8(Yaw+Roll 一起用,轉出圓弧)`);
      dots[Math.min(ci,7)].scale.setScalar(1+Math.sin(performance.now()/180)*.08);
    }
  }};
}};

/* ---- 9 五點精準降落 ---- */
LVDEF[9]={name:'五點精準降落',obj:'依顏色順序輕降5塊色墊(觸地即算,重落地記失誤)',
 start:[0,12.5],
 setup(){
  const pads=[[0,10,'紅',0xff5a6e],[2.2,8.2,'藍',0x5aa7ff],[1.4,5.8,'黃',0xffd166],
    [-1.4,5.8,'綠',0x4fe3a3],[-2.2,8.2,'紫',0x9b7bff]];
  const meshes=pads.map(([x,z,,c])=>floorPad(x,z,.6,c,.8));
  let pi=0,air=false,pAlt=0;
  const seqStr=pads.map(p=>p[2]).join('→');
  return{update(dt){
    const touchdown=alt()<=.02&&pAlt>.02;
    if(alt()>.5)air=true;
    if(touchdown&&air&&pi<5){
      const[x,z,name]=pads[pi];
      if(Math.hypot(pos.x-x,pos.z-z)<.6){
        if(Math.abs(lastVy)>1.8)addFault('重落地!下次輕一點');
        meshes[pi].material.opacity=.25;pi++;air=false;beep(700+pi*80);
        if(pi===5)success('五點降落完成!');
        else toast(`✓ ${name}!下一塊:${pads[pi][2]}`,1100);}
      else{air=false;toast('不在色墊上,重新起飛瞄準');}
    }
    if(pi<5)prog(`順序:${seqStr}|下一塊:${pads[pi][2]}(輕降!)`);
    pAlt=alt();
  }};
}};

/* ---- 10 擋球守門 ---- */
LVDEF[10]={name:'擋球守門+斷電',obj:'守備區擋5顆來球(高度差<35cm)→降落→1秒內斷電',
 start:[0,16.5],
 setup(){
  slab(0,.06,16.5,4,.1,2,0x4fe3a3,.12);
  const balls=[];let blocks=0,spawnT=1.2,ph=0,landT=0,pAlt=0,air=false;
  $('disarmBtn').classList.add('show');
  function spawn(){
    const b=new THREE.Mesh(new THREE.SphereGeometry(.25,14,10),
      new THREE.MeshBasicMaterial({color:0xff5a6e}));
    const y=[.6,1.1,1.6][Math.floor(Math.random()*3)];
    b.position.set((Math.random()*3-1.5),y,6);
    b._v=new THREE.Vector3((Math.random()*2-1)*.4,0,4.2);
    levelGroup.add(b);balls.push(b);
  }
  return{update(dt){
    if(ph===0){
      spawnT-=dt;
      if(spawnT<=0&&balls.length<2){spawn();spawnT=2.3;}
      for(let i=balls.length-1;i>=0;i--){const b=balls[i];
        b.position.addScaledVector(b._v,dt);
        tmp.copy(b.position).sub(pos);
        if(tmp.length()<.85&&Math.abs(b.position.y-pos.y)<.35){
          blocks++;beep(760,.12);toast(`🛡 擋下!${blocks}/5`,800);
          levelGroup.remove(b);balls.splice(i,1);
          if(blocks>=5){ph=1;balls.forEach(x=>levelGroup.remove(x));balls.length=0;
            toast('5 球全擋下!降落並在 1 秒內斷電!',2200);beep(980,.25);}
          continue;}
        if(b.position.z>18.1&&Math.abs(b.position.x)<2&&b.position.y<1.9){
          addFault('被射進球門!');levelGroup.remove(b);balls.splice(i,1);continue;}
        if(b.position.z>19.2){levelGroup.remove(b);balls.splice(i,1);}
      }
      prog(`守住球門!已擋 ${blocks}/5(高度要對準來球 ±35cm)`);
    }else if(ph===1){
      if(alt()>.5)air=true;
      const touchdown=alt()<=.02&&pAlt>.02;
      if(touchdown&&air){ph=2;landT=1;}
      prog('降落!觸地後 1 秒內按「斷電」(空白鍵/✕/紅色鈕)');
    }else if(ph===2){
      landT-=dt;
      if(disarmReq){success('守門+斷電完成!你是合格的守門員!');return;}
      if(landT<=0){toast('超過 1 秒!重新起飛再降落一次');ph=1;air=false;}
      else prog(`斷電倒數 ${landT.toFixed(2)} 秒!!`);
    }
    pAlt=alt();
  }};
}};

/* ================= level flow ================= */
function loadLevel(id){
  curLv=id;doneFlag=false;faults=0;t0=0;flying=false;
  $('flt').textContent='0';$('tim').textContent='0.0';
  $('disarmBtn').classList.remove('show');
  while(levelGroup.children.length)levelGroup.remove(levelGroup.children[0]);
  const def=LVDEF[id];
  pos.set(def.start[0],.15,def.start[1]);vel.set(0,0,0);yaw=0;
  LV=def.setup();
  $('obj').textContent=(id?`第 ${id} 題|`:'')+def.obj;
  toast((id?`第 ${id} 題:`:'')+def.name,1800);
  fwd.set(0,0,1);
  camera.position.set(pos.x,2.4,pos.z-4.6);camera.lookAt(pos.x,1,pos.z+2);
  $('menu').classList.add('hidden');$('done').classList.add('hidden');
}
function restartLevel(){loadLevel(curLv);}
function success(msg){
  if(doneFlag)return;doneFlag=true;LV=null;
  const t=elapsed();saveBest(curLv,t,faults);beep(1200,.3);
  $('doneTitle').textContent='🏁 '+(curLv?`第 ${curLv} 題過關!`:'穿環完賽!');
  $('doneTime').textContent=t.toFixed(1)+' 秒|失誤 '+faults;
  $('doneSub').textContent=msg;
  $('nextBtn').style.display=(curLv>=1&&curLv<10)?'':'none';
  $('disarmBtn').classList.remove('show');
  buildMenu();
  $('done').classList.remove('hidden');
}
function buildMenu(){
  const g=$('lvgrid');g.innerHTML='';
  LVDEF.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='lvbtn'+(i===0?' free':'');
    const bs=best[i]?`<span class="ok">✓ 最佳 ${best[i].t}s/失誤${best[i].f}</span>`:'尚未過關';
    b.innerHTML=`<span class="nm">${i===0?'🚁':'<span class="no">'+i+'</span>'}${d.name}</span><span class="bs">${bs}</span>`;
    b.onclick=()=>{beep(700,.06);loadLevel(i);};
    g.appendChild(b);
  });
}
$('menuBtn').onclick=()=>{buildMenu();$('menu').classList.remove('hidden');};
$('resetBtn').onclick=restartLevel;
$('againBtn').onclick=restartLevel;
$('backBtn').onclick=()=>{$('done').classList.add('hidden');buildMenu();$('menu').classList.remove('hidden');};
$('nextBtn').onclick=()=>loadLevel(Math.min(10,curLv+1));
$('camBtn').onclick=()=>{camMode=(camMode+1)%2;
  $('camBtn').textContent=camMode?'📷 俯瞰':'📷 跟隨';};
addEventListener('gamepadconnected',e=>toast('🎮 手把已連線',2000));

/* ================= main loop ================= */
function resize(){renderer.setSize(innerWidth,innerHeight,false);
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();
buildMenu();loadLevel(0);buildMenu();$('menu').classList.remove('hidden');
let lastT=performance.now();
renderer.setAnimationLoop(()=>{
  const now=performance.now();
  const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  const inp=readInput();
  physStep(dt,inp);
  if(LV)LV.update(dt);
  disarmReq=false;
  if(camMode===0){
    tmp.set(pos.x-fwd.x*4.6,pos.y+2.1,pos.z-fwd.z*4.6);
    camera.position.lerp(tmp,Math.min(1,5*dt));
    camera.lookAt(pos.x,pos.y+.4,pos.z);
  }else{
    tmp.set(pos.x*.4,15,pos.z*.55+4);
    camera.position.lerp(tmp,Math.min(1,4*dt));
    camera.lookAt(pos.x,0,pos.z);
  }
  $('alt').textContent=Math.max(0,alt()).toFixed(1);
  $('spd').textContent=vel.length().toFixed(1);
  if(t0&&!doneFlag)$('tim').textContent=elapsed().toFixed(1);
  renderer.render(scene,camera);
});
</script>
